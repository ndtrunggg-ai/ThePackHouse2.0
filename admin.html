<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>The Pack House — Quản trị</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="admin.css?v=2" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="./assets/logo.png" />
</head>
<body>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel">
    // Dynamically choose API URL. Use local proxy if on localhost, else use Vercel proxy.
    const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
      ? 'http://localhost:4000/proxy' 
      : '/proxy';

    function AdminApp() {
      const [token, setToken] = React.useState(localStorage.getItem("admin_token"));
      const [email, setEmail] = React.useState("");
      const [password, setPassword] = React.useState("");
      const [error, setError] = React.useState("");
      const [orders, setOrders] = React.useState([]);
      const [loading, setLoading] = React.useState(false);
      const [activeTab, setActiveTab] = React.useState("orders");

      const handleLogin = async (e) => {
        e.preventDefault();
        setError("");
        try {
          const res = await fetch(`${API_URL}/admin/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password })
          });
          const data = await res.json();
          if (data.data && data.data.token) {
            localStorage.setItem("admin_token", data.data.token);
            setToken(data.data.token);
          } else {
            setError("Thông tin đăng nhập không hợp lệ");
          }
        } catch (err) {
          setError("Không thể kết nối đến máy chủ");
        }
      };

      const fetchOrders = async () => {
        setLoading(true);
        try {
          const res = await fetch(`${API_URL}/content-manager/collection-types/api::order.order?sort=createdAt:DESC`, {
            headers: {
              'Authorization': `Bearer ${token}`
            }
          });
          if (res.status === 401 || res.status === 403) {
            setToken(null);
            localStorage.removeItem("admin_token");
          } else {
            const data = await res.json();
            setOrders(data.results || []);
          }
        } catch (err) {
          console.error(err);
        } finally {
          setLoading(false);
        }
      };

      React.useEffect(() => {
        if (token && activeTab === 'orders') {
          fetchOrders();
        }
      }, [token, activeTab]);

      if (!token) {
        return (
          <div className="admin-login-wrapper">
            <div className="admin-login-card">
              <h2 className="admin-login-title">Đăng nhập Quản trị</h2>
              {error && <div className="admin-error">{error}</div>}
              <form onSubmit={handleLogin}>
                <input 
                  type="email" 
                  className="admin-input" 
                  placeholder="Email" 
                  value={email} 
                  onChange={e => setEmail(e.target.value)} 
                  required 
                />
                <input 
                  type="password" 
                  className="admin-input" 
                  placeholder="Mật khẩu" 
                  value={password} 
                  onChange={e => setPassword(e.target.value)} 
                  required 
                />
                <button type="submit" className="admin-btn">Đăng nhập</button>
              </form>
            </div>
          </div>
        );
      }

      const totalRevenue = orders.reduce((acc, o) => acc + (o.total || 0), 0);
      const newOrders = orders.filter(o => o.status === 'pending');
      const inTransit = orders.filter(o => o.status === 'shipped');

      const renderContent = () => {
        switch (activeTab) {
          case 'orders':
            return (
              <React.Fragment>
                <div className="admin-stats">
                  <div className="admin-stat-card">
                    <span className="admin-stat-label">Tổng đơn hàng</span>
                    <h3 className="admin-stat-value">{orders.length}</h3>
                    <span className="admin-stat-sub">Tháng này</span>
                  </div>
                  <div className="admin-stat-card">
                    <span className="admin-stat-label">Đơn mới hôm nay</span>
                    <h3 className="admin-stat-value blue">{newOrders.length}</h3>
                    <span className="admin-stat-sub">Cần xử lý</span>
                  </div>
                  <div className="admin-stat-card">
                    <span className="admin-stat-label">Đang giao</span>
                    <h3 className="admin-stat-value orange">{inTransit.length}</h3>
                    <span className="admin-stat-sub">Trên đường</span>
                  </div>
                  <div className="admin-stat-card">
                    <span className="admin-stat-label">Doanh thu</span>
                    <h3 className="admin-stat-value">{totalRevenue.toLocaleString()} ₫</h3>
                    <span className="admin-stat-sub">Tổng cộng</span>
                  </div>
                </div>

                <div className="admin-tabs">
                  <button className="admin-tab active">Tất cả</button>
                  <button className="admin-tab">Mới</button>
                  <button className="admin-tab">Đang xử lý</button>
                </div>

                <div className="admin-table-wrapper">
                  <table className="admin-table">
                    <thead>
                      <tr>
                        <th>Mã đơn</th>
                        <th>Khách hàng</th>
                        <th>Sản phẩm</th>
                        <th>Tổng tiền</th>
                      </tr>
                    </thead>
                    <tbody>
                      {loading ? (
                        <tr><td colSpan="4" style={{textAlign:'center', padding:'40px'}}><div className="loading-spinner"></div></td></tr>
                      ) : orders.length === 0 ? (
                        <tr><td colSpan="4"><div className="empty-state">Không có đơn hàng nào.</div></td></tr>
                      ) : (
                        orders.map(o => {
                          let itemsText = "Sản phẩm";
                          try {
                            const items = Array.isArray(o.items) ? o.items : JSON.parse(o.items || "[]");
                            if (items.length > 0) {
                              itemsText = items.map(i => `${i.name} ×1`).join(", ");
                            }
                          } catch (e) {}

                          return (
                            <tr key={o.documentId || o.id}>
                              <td className="admin-td-order">#{o.id || o.documentId?.substring(0,4)}</td>
                              <td className="admin-td-customer">{o.customerName}<br/><span style={{fontSize:'12px', color:'var(--admin-text-muted)'}}>{o.city}</span></td>
                              <td className="admin-td-items">{itemsText}</td>
                              <td className="admin-td-total">{(o.total || 0).toLocaleString()} ₫</td>
                            </tr>
                          );
                        })
                      )}
                    </tbody>
                  </table>
                </div>
              </React.Fragment>
            );
          case 'products':
            return (
              <div className="empty-state" style={{marginTop:'40px'}}>
                <span style={{fontSize:'32px'}}>📦</span>
                <h3 style={{marginTop:'16px'}}>Quản lý Sản phẩm</h3>
                <p>Tính năng quản lý kho và sản phẩm trực tiếp từ Frontend đang được phát triển.<br/>Vui lòng truy cập hệ thống Strapi Cloud để thêm hoặc chỉnh sửa sản phẩm.</p>
              </div>
            );
          case 'customers':
            return (
              <div className="empty-state" style={{marginTop:'40px'}}>
                <span style={{fontSize:'32px'}}>👥</span>
                <h3 style={{marginTop:'16px'}}>Dữ liệu Khách hàng</h3>
                <p>Hệ thống CRM và lịch sử mua hàng đang được đồng bộ.</p>
              </div>
            );
          case 'shipping':
            return (
              <div className="empty-state" style={{marginTop:'40px'}}>
                <span style={{fontSize:'32px'}}>🚚</span>
                <h3 style={{marginTop:'16px'}}>Theo dõi Vận chuyển</h3>
                <p>Tính năng tích hợp API giao hàng (GHTK, Viettel Post) đang được xây dựng.</p>
              </div>
            );
          case 'analytics':
            return (
              <div className="empty-state" style={{marginTop:'40px'}}>
                <span style={{fontSize:'32px'}}>📊</span>
                <h3 style={{marginTop:'16px'}}>Báo cáo & Phân tích</h3>
                <p>Biểu đồ doanh thu và phân tích hiệu suất đang được tổng hợp.</p>
              </div>
            );
          default: return null;
        }
      };

      const getTitle = () => {
        switch(activeTab) {
          case 'orders': return 'Đơn hàng';
          case 'products': return 'Sản phẩm';
          case 'customers': return 'Khách hàng';
          case 'shipping': return 'Vận chuyển';
          case 'analytics': return 'Phân tích';
          default: return '';
        }
      }

      return (
        <div className="admin-layout">
          {/* LEFT SIDEBAR */}
          <div className="admin-sidebar">
            <div className="admin-brand">
              The Pack House
              <div className="admin-brand-sub">Hệ thống Quản trị</div>
            </div>
            <nav className="admin-nav">
              <a href="#" className={`admin-nav-item ${activeTab === 'orders' ? 'active' : ''}`} onClick={(e) => { e.preventDefault(); setActiveTab('orders'); }}>
                <span className="admin-nav-icon">🛒</span>
                Đơn hàng
                {newOrders.length > 0 && <span className="admin-badge-red">{newOrders.length}</span>}
              </a>
              <a href="#" className={`admin-nav-item ${activeTab === 'products' ? 'active' : ''}`} onClick={(e) => { e.preventDefault(); setActiveTab('products'); }}>
                <span className="admin-nav-icon">📦</span>
                Sản phẩm
              </a>
              <a href="#" className={`admin-nav-item ${activeTab === 'customers' ? 'active' : ''}`} onClick={(e) => { e.preventDefault(); setActiveTab('customers'); }}>
                <span className="admin-nav-icon">👥</span>
                Khách hàng
              </a>
              <a href="#" className={`admin-nav-item ${activeTab === 'shipping' ? 'active' : ''}`} onClick={(e) => { e.preventDefault(); setActiveTab('shipping'); }}>
                <span className="admin-nav-icon">🚚</span>
                Vận chuyển
              </a>
              <a href="#" className={`admin-nav-item ${activeTab === 'analytics' ? 'active' : ''}`} onClick={(e) => { e.preventDefault(); setActiveTab('analytics'); }}>
                <span className="admin-nav-icon">📊</span>
                Phân tích
              </a>
            </nav>
          </div>

          {/* MAIN CONTENT */}
          <div className="admin-main">
            <header className="admin-header">
              <h1 className="admin-title">{getTitle()}</h1>
              <div className="admin-header-right">
                <span className="admin-bell">🔔</span>
                <div className="admin-avatar">TP</div>
              </div>
            </header>

            <div className="admin-content">
              {renderContent()}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<AdminApp />);
  </script>
</body>
</html>
