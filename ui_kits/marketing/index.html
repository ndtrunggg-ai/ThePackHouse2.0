<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>The Pack House — Carry your home, anywhere.</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="styles.css?v=4" />
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="Nav.jsx?v=5"></script>
<script type="text/babel" src="Hero.jsx?v=5"></script>
<script type="text/babel" src="BrandTabs.jsx?v=5"></script>
<script type="text/babel" src="TypeFilters.jsx?v=5"></script>
<script type="text/babel" src="ProductCard.jsx?v=5"></script>
<script type="text/babel" src="ProductGrid.jsx?v=5"></script>
<script type="text/babel" src="ProductModal.jsx?v=5"></script>
<script type="text/babel" src="StoreInfo.jsx?v=5"></script>
<script type="text/babel" src="Footer.jsx?v=5"></script>
<script type="text/babel" src="CartDrawer.jsx?v=5"></script>

<script type="text/babel">
function App() {
  const [products, setProducts] = React.useState([]);
  const [cartOpen, setCartOpen] = React.useState(false);
  const [items, setItems] = React.useState([]);
  const [brand, setBrand] = React.useState("all");
  const [type, setType] = React.useState("all");
  const [search, setSearch] = React.useState("");
  const [sort, setSort] = React.useState("featured");
  
  const [lang, setLang] = React.useState("vi");
  const [selectedProduct, setSelectedProduct] = React.useState(null);

  React.useEffect(() => {
    fetch('http://localhost:5000/api/products')
      .then(res => res.json())
      .then(data => setProducts(data));
  }, []);

  const handleAdd = (p) => {
    setItems((arr) => [...arr, { name: p.name, color: p.brand, price: p.price }]);
    setCartOpen(true);
  };
  const handleRemove = (i) => setItems((arr) => arr.filter((_, j) => j !== i));
  const handleClear  = () => { setBrand("all"); setType("all"); setSearch(""); };

  const filteredCount = products.filter(p =>
    (brand === "all" || p.brand === brand) &&
    (type === "all" || p.type === type) &&
    (!search.trim() || (p.name + " " + p.brand + " " + (p.specs ? p.specs.join(" ") : "")).toLowerCase().includes(search.toLowerCase()))
  ).length;

  const scrollToShop = () => {
    const el = document.getElementById("shop");
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  };

  const isEn = lang === 'en';
  const t = {
    shopEye: isEn ? "01 — Shop" : "01 — Cửa hàng",
    shopTitle: isEn ? "Explore the Collection" : "Khám phá sản phẩm",
    shopSub: isEn ? "Every product here is available at our Quan Ngua store. Filter by brand, type, or just browse." : "Mọi sản phẩm trên trang này đều có sẵn tại cửa hàng Quần Ngựa. Lọc theo thương hiệu, phân loại hoặc chỉ cần lướt xem."
  };

  return (
    <>
      <Nav 
        onCartOpen={() => setCartOpen(true)} cartCount={items.length}
        searchValue={search} onSearchChange={setSearch} 
        lang={lang} setLang={setLang} 
      />

      <Hero onShopAll={scrollToShop} lang={lang} />

      <section id="shop" className="tph-shop">
        <div className="tph-shop-head">
          <div>
            <div className="tph-shop-eye">{t.shopEye}</div>
            <h2 className="tph-shop-title">{t.shopTitle}</h2>
          </div>
          <p className="tph-shop-sub">{t.shopSub}</p>
        </div>

        <BrandTabs selected={brand} onSelect={setBrand} lang={lang} />
        <TypeFilters
          selected={type}
          onSelect={setType}
          resultCount={filteredCount}
          sort={sort}
          onSort={setSort}
          lang={lang}
        />
        <ProductGrid
          products={products}
          brand={brand}
          type={type}
          search={search}
          sort={sort}
          onAdd={handleAdd}
          onView={setSelectedProduct}
          onClearFilters={handleClear}
          lang={lang}
        />
      </section>

      <StoreInfo lang={lang} />

      <Footer lang={lang} />

      <CartDrawer
        open={cartOpen}
        items={items}
        onClose={() => setCartOpen(false)}
        onRemove={handleRemove}
        lang={lang}
      />

      <ProductModal 
        product={selectedProduct} 
        onClose={() => setSelectedProduct(null)} 
        onAdd={handleAdd} 
        lang={lang} 
      />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
