<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Newsreader:wght@300;400&family=Inter:wght@300&display=swap');
  body { margin: 0; padding: 0; background: transparent; }
  .wrap { display: flex; flex-direction: column; gap: 24px; padding: 0; }
  .panel { border-radius: 12px; padding: 40px 20px 36px; display: flex; flex-direction: column; align-items: center; gap: 0; }
  .panel-light { background: #F6F1E9; border: 0.75px solid #E2D4BC; }
  .panel-dark  { background: #111009; border: 0.75px solid #2A2010; }
  .est { font-family: 'Newsreader', Georgia, serif; font-weight: 300; font-size: 12px; letter-spacing: 7px; margin: 0 0 6px; display: flex; align-items: center; gap: 12px; }
  .est-light { color: #B09060; }
  .est-dark  { color: #C8A97A; }
  .rule-light { flex: 1; height: 0.5px; background: #C8A97A; max-width: 56px; }
  .rule-dark  { flex: 1; height: 0.5px; background: #6B5030; max-width: 56px; }
  .wordmark { font-family: 'Newsreader', Georgia, serif; font-weight: 300; font-size: 46px; letter-spacing: 3px; margin: 0 0 6px; line-height: 1; }
  .wordmark-light { color: #2A1F0E; }
  .wordmark-dark  { color: #F2E8D8; }
  .tagline { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 10px; letter-spacing: 6px; margin: 0; }
  .tagline-light { color: #B09060; }
  .tagline-dark  { color: #C8A97A; }
</style>
</head>
<body>
<div class="wrap">

  <!-- LIGHT -->
  <div class="panel panel-light">
    <svg width="200" height="290" viewBox="0 0 200 290" xmlns="http://www.w3.org/2000/svg">
      <!-- STRAPS -->
      <path d="M44,100 Q14,78 16,42 Q18,18 44,14 Q64,10 80,30 Q86,40 86,56" fill="none" stroke="#C8A97A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M156,100 Q186,78 184,42 Q182,18 156,14 Q136,10 120,30 Q114,40 114,56" fill="none" stroke="#C8A97A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M80,30 Q100,20 120,30" fill="none" stroke="#C8A97A" stroke-width="7" stroke-linecap="round"/>
      <circle cx="100" cy="22" r="8" fill="#C8A97A"/>
      <circle cx="100" cy="22" r="4" fill="#F0E6D2"/>
      <!-- BAG BODY -->
      <rect x="10" y="96" width="180" height="180" rx="24" fill="#2A1F0E"/>
      <!-- TOP FLAP -->
      <rect x="16" y="80" width="168" height="38" rx="15" fill="#3A2C14"/>
      <path d="M30,98 Q100,105 170,98" fill="none" stroke="#C8A97A" stroke-width="1" stroke-linecap="round"/>
      <!-- HOUSE CARD -->
      <rect x="26" y="114" width="148" height="148" rx="6" fill="#F0E6D2"/>
      <!-- UPPER GABLE -->
      <polygon points="100,102 136,114 64,114" fill="#C8A97A"/>
      <!-- LOWER EAVE -->
      <polygon points="100,108 168,126 32,126" fill="#A8893A"/>
      <line x1="32" y1="126" x2="168" y2="126" stroke="#8A7030" stroke-width="0.75"/>
      <!-- UPPER FLOOR -->
      <rect x="44" y="126" width="112" height="44" rx="1" fill="#E8DCC8"/>
      <!-- LEFT SHUTTER -->
      <rect x="50" y="131" width="18" height="30" rx="1" fill="#C8A97A" opacity="0.25"/>
      <line x1="59" y1="131" x2="59" y2="161" stroke="#B09060" stroke-width="0.8"/>
      <!-- CENTRE WINDOW -->
      <rect x="78" y="131" width="44" height="30" rx="1" fill="none" stroke="#B09060" stroke-width="1.2"/>
      <line x1="100" y1="131" x2="100" y2="161" stroke="#B09060" stroke-width="0.8"/>
      <!-- RIGHT SHUTTER -->
      <rect x="132" y="131" width="18" height="30" rx="1" fill="#C8A97A" opacity="0.25"/>
      <line x1="141" y1="131" x2="141" y2="161" stroke="#B09060" stroke-width="0.8"/>
      <!-- STILTS -->
      <rect x="52" y="170" width="5" height="46" rx="1" fill="#B09060"/>
      <rect x="72" y="170" width="5" height="46" rx="1" fill="#B09060"/>
      <rect x="123" y="170" width="5" height="46" rx="1" fill="#B09060"/>
      <rect x="143" y="170" width="5" height="46" rx="1" fill="#B09060"/>
      <!-- GROUND LINE -->
      <line x1="26" y1="248" x2="174" y2="248" stroke="#C8A97A" stroke-width="0.7" opacity="0.5"/>
    </svg>
    <div class="est est-light"><span class="rule-light"></span>EST. HANOI<span class="rule-light"></span></div>
    <div class="wordmark wordmark-light">The Pack House</div>
    <div class="tagline tagline-light">BAGS · BACKPACKS · LUGGAGE</div>
  </div>

  <!-- DARK -->
  <div class="panel panel-dark">
    <svg width="200" height="290" viewBox="0 0 200 290" xmlns="http://www.w3.org/2000/svg">
      <!-- STRAPS -->
      <path d="M44,100 Q14,78 16,42 Q18,18 44,14 Q64,10 80,30 Q86,40 86,56" fill="none" stroke="#F0E6D2" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M156,100 Q186,78 184,42 Q182,18 156,14 Q136,10 120,30 Q114,40 114,56" fill="none" stroke="#F0E6D2" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M80,30 Q100,20 120,30" fill="none" stroke="#F0E6D2" stroke-width="7" stroke-linecap="round"/>
      <circle cx="100" cy="22" r="8" fill="#F0E6D2"/>
      <circle cx="100" cy="22" r="4" fill="#111009"/>
      <!-- BAG BODY -->
      <rect x="10" y="96" width="180" height="180" rx="24" fill="#C8A97A"/>
      <!-- TOP FLAP -->
      <rect x="16" y="80" width="168" height="38" rx="15" fill="#E8C98A"/>
      <path d="M30,98 Q100,105 170,98" fill="none" stroke="#F0E6D2" stroke-width="1" stroke-linecap="round"/>
      <!-- HOUSE CARD — warm brown -->
      <rect x="26" y="114" width="148" height="148" rx="6" fill="#3D2810"/>
      <!-- UPPER GABLE -->
      <polygon points="100,102 136,114 64,114" fill="#F0E6D2"/>
      <!-- LOWER EAVE -->
      <polygon points="100,108 168,126 32,126" fill="#C8A97A"/>
      <line x1="32" y1="126" x2="168" y2="126" stroke="#A8893A" stroke-width="0.75"/>
      <!-- UPPER FLOOR -->
      <rect x="44" y="126" width="112" height="44" rx="1" fill="#4E3418"/>
      <!-- LEFT SHUTTER -->
      <rect x="50" y="131" width="18" height="30" rx="1" fill="#C8A97A" opacity="0.3"/>
      <line x1="59" y1="131" x2="59" y2="161" stroke="#E8C98A" stroke-width="0.8"/>
      <!-- CENTRE WINDOW -->
      <rect x="78" y="131" width="44" height="30" rx="1" fill="none" stroke="#E8C98A" stroke-width="1.2"/>
      <line x1="100" y1="131" x2="100" y2="161" stroke="#E8C98A" stroke-width="0.8"/>
      <!-- RIGHT SHUTTER -->
      <rect x="132" y="131" width="18" height="30" rx="1" fill="#C8A97A" opacity="0.3"/>
      <line x1="141" y1="131" x2="141" y2="161" stroke="#E8C98A" stroke-width="0.8"/>
      <!-- STILTS -->
      <rect x="52" y="170" width="5" height="46" rx="1" fill="#C8A97A"/>
      <rect x="72" y="170" width="5" height="46" rx="1" fill="#C8A97A"/>
      <rect x="123" y="170" width="5" height="46" rx="1" fill="#C8A97A"/>
      <rect x="143" y="170" width="5" height="46" rx="1" fill="#C8A97A"/>
      <!-- GROUND LINE -->
      <line x1="26" y1="248" x2="174" y2="248" stroke="#F0E6D2" stroke-width="0.7" opacity="0.3"/>
    </svg>
    <div class="est est-dark"><span class="rule-dark"></span>EST. HANOI<span class="rule-dark"></span></div>
    <div class="wordmark wordmark-dark">The Pack House</div>
    <div class="tagline tagline-dark">BAGS · BACKPACKS · LUGGAGE</div>
  </div>

</div>
</body>
</html>
