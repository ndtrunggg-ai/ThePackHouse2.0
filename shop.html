<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Cửa hàng · The Pack House</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="styles.css?v=3" />
<style>
  .tph-shop-page-hero { background: var(--ph-cream-50); padding: 64px 48px 40px;
    border-bottom: 0.5px solid var(--ph-sand-300); }
  .tph-shop-page-hero-inner { max-width: 1320px; margin: 0 auto;
    display: grid; grid-template-columns: 1.2fr 1fr; gap: 64px; align-items: end; }
  .tph-crumb { font-family: var(--font-sans); font-weight: 500; font-size: 10px;
    letter-spacing: 0.32em; text-transform: uppercase; color: var(--ph-sand-500);
    margin-bottom: 12px; }
  .tph-crumb a { color: var(--ph-cocoa-850); text-decoration: none; }
  .tph-crumb a:hover { color: var(--ph-bronze-500); }
  .tph-shop-page-title { font-family: var(--font-serif); font-weight: 300; font-size: 72px;
    line-height: 0.98; color: var(--ph-cocoa-850); margin: 0; letter-spacing: -0.01em; }
  .tph-shop-page-title em { font-style: italic; color: var(--ph-bronze-500); }
  .tph-shop-page-desc { font-family: var(--font-serif); font-weight: 300; font-size: 17px;
    line-height: 1.6; color: var(--ph-cocoa-700); max-width: 380px; margin: 0; }
  .tph-shop-stats { display: flex; gap: 28px; margin-top: 36px;
    padding-top: 22px; border-top: 0.5px solid var(--ph-sand-300); }
  .tph-shop-stat { display: flex; flex-direction: column; gap: 4px; }
  .tph-shop-stat-num { font-family: var(--font-serif); font-weight: 300; font-size: 28px;
    color: var(--ph-cocoa-850); }
  .tph-shop-stat-lbl { font-family: var(--font-sans); font-size: 10px;
    letter-spacing: 0.28em; text-transform: uppercase; color: var(--ph-sand-500); }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Nav.jsx?v=4"></script>
<script type="text/babel" src="BrandTabs.jsx?v=4"></script>
<script type="text/babel" src="TypeFilters.jsx?v=4"></script>
<script type="text/babel" src="ProductCard.jsx?v=4"></script>
<script type="text/babel" src="ProductGrid.jsx?v=4"></script>
<script type="text/babel" src="Footer.jsx?v=4"></script>
<script type="text/babel" src="CartDrawer.jsx?v=4"></script>

<script type="text/babel">
function ShopPage() {
  const [products, setProducts] = React.useState([]);
  const [cartOpen, setCartOpen] = React.useState(false);
  const [items, setItems] = React.useState([]);
  const [brand, setBrand] = React.useState("all");
  const [type, setType] = React.useState("all");
  const [search, setSearch] = React.useState("");
  const [sort, setSort] = React.useState("featured");

  React.useEffect(() => {
    fetch('http://localhost:5000/api/products')
      .then(res => res.json())
      .then(data => setProducts(data));
  }, []);

  const handleAdd = (p) => {
    setItems((arr) => [...arr, { name: p.name, color: p.brand, price: p.price, swatch: "linear-gradient(180deg,#C8A97A,#8A7030)" }]);
    setCartOpen(true);
  };
  const handleRemove = (i) => setItems((arr) => arr.filter((_, j) => j !== i));
  const handleClear  = () => { setBrand("all"); setType("all"); setSearch(""); };

  const filteredCount = products.filter(p =>
    (brand === "all" || p.brand === brand) &&
    (type === "all" || p.type === type) &&
    (!search.trim() || (p.name + " " + p.brand + " " + (p.specs ? p.specs.join(" ") : "")).toLowerCase().includes(search.toLowerCase()))
  ).length;

  return (
    <>
      <Nav onCartOpen={() => setCartOpen(true)} cartCount={items.length}
           searchValue={search} onSearchChange={setSearch} />

      <header className="tph-shop-page-hero">
        <div className="tph-shop-page-hero-inner">
          <div>
            <div className="tph-crumb"><a href="index.html">Trang chủ</a> &nbsp;·&nbsp; Cửa hàng</div>
            <h1 className="tph-shop-page-title">Khám phá<br/><em>Bộ sưu tập.</em></h1>
            <div className="tph-shop-stats">
              <div className="tph-shop-stat"><span className="tph-shop-stat-num">{products.length}</span><span className="tph-shop-stat-lbl">Sản phẩm</span></div>
              <div className="tph-shop-stat"><span className="tph-shop-stat-num">5</span><span className="tph-shop-stat-lbl">Thương hiệu</span></div>
              <div className="tph-shop-stat"><span className="tph-shop-stat-num">60 ngày</span><span className="tph-shop-stat-lbl">Đổi trả</span></div>
            </div>
          </div>
          <p className="tph-shop-page-desc">
            Chúng tôi không bán mọi thứ. Chúng tôi mang đến những sản phẩm tốt nhất. 
            Mỗi sản phẩm trên kệ đều được lựa chọn kỹ lưỡng, đồng hành cùng bạn trên những chặng đường.
          </p>
        </div>
      </header>

      <section className="tph-shop" style={{paddingTop: 48}}>
        <BrandTabs selected={brand} onSelect={setBrand} />
        <TypeFilters
          selected={type}
          onSelect={setType}
          resultCount={filteredCount}
          sort={sort}
          onSort={setSort}
        />
        <ProductGrid
          products={products}
          brand={brand}
          type={type}
          search={search}
          sort={sort}
          onAdd={handleAdd}
          onClearFilters={handleClear}
        />
      </section>

      <Footer />

      <CartDrawer
        open={cartOpen}
        items={items}
        onClose={() => setCartOpen(false)}
        onRemove={handleRemove}
      />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ShopPage />);
</script>

</body>
</html>
